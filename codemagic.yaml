workflows:
  ios-release:
    name: FloraSonics iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base698ab9ae938dc61b1a405bd7.app
      vars:
        BUNDLE_ID: "com.base698ab9ae938dc61b1a405bd7.app"
        APP_STORE_APPLE_ID: "6761284963"
      node: 22.0.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform, sync and install pods
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          cd ios/App
          pod install --repo-update

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
