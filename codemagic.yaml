workflows:
  ios-release:
    name: FloraSonics iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      vars:
        BUNDLE_ID: "com.florasonics.app"
        APP_STORE_APPLE_ID: "6761284963"
      node: 22.0.0
      xcode: 16.2

    scripts:
      - name: Print Node version
        script: node --version

      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --ios
        working_directory: .

      - name: Add iOS platform, sync and install pods
        script: |
          set -e
          node --version
          rm -rf ios
          echo "--- capacitor.config.ts contents ---"
          cat capacitor.config.ts
          echo "--- running cap add ios ---"
          npx cap add ios
          echo "--- running cap sync ios ---"
          npx cap sync ios
          echo "--- checking ios/App directory ---"
          ls -la ios/App/
          echo "--- iOS platform ready (SPM, no CocoaPods needed) ---"

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Fetch signing files and set up keychain
        script: |
          keychain initialize
          PRIVATE_KEY=$(openssl genrsa 2048 | openssl pkcs8 -topk8 -nocrypt)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$PRIVATE_KEY"
          keychain add-certificates

      - name: Build iOS
        script: |
          set -e
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=4CYS3PZNWH"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: FloraSonics Android Release
    max_build_duration: 60
    instance_type: linux_x2

 environment:
    android_signing:
      - FloraSonics2
    vars:
      PACKAGE_NAME: "com.base698ab9ae938dc61b1a405bd7.app"
    node: 22.0.0
    java: 21

    scripts:
      - name: Print Node version
        script: node --version

      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --android
        working_directory: .

      - name: Add Android platform and sync
        script: |
          set -e
          rm -rf android
          echo "--- running cap add android ---"
          npx cap add android
          echo "--- running cap sync android ---"
          npx cap sync android

      - name: Build Android
        script: |
          cd android
          ./gradlew build
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
