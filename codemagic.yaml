workflows:
  ios-release:
    name: FloraSonics iOS Release v2
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base698ab9ae938dc61b1a405bd7.app
      vars:
        BUNDLE_ID: "com.base698ab9ae938dc61b1a405bd7.app"
        APP_STORE_APPLE_ID: "6761284963"
      node: 22.14.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --ios
        working_directory: .

      - name: Add iOS platform, sync and install pods
        script: |
          set -e
          npx cap add ios
          npx cap sync ios
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install --repo-update
          else
            echo "No Podfile found — using Swift Package Manager, skipping pod install"
          fi

      - name: Fix bundle identifier in Xcode
        script: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.base698ab9ae938dc61b1a405bd7.app;/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Set signing settings
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -showBuildSettings 2>/dev/null | grep -E "DEVELOPMENT_TEAM|CODE_SIGN" || true

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          set -e
          echo "=== Listing ios/App directory ==="
          ls -la ios/App/ || true
          xcode-project use-profiles
          if [ -d "ios/App/App.xcworkspace" ]; then
            xcode-project build-ipa \
              --workspace "ios/App/App.xcworkspace" \
              --scheme "App" \
              --config "Release"
          else
            xcode-project build-ipa \
              --project "ios/App/App.xcodeproj" \
              --scheme "App" \
              --config "Release"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: FloraSonics Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - florasonics_keystore
      vars:
        PACKAGE_NAME: "com.base698ab9ae938dc61b1a405bd7.app"
      node: 22.14.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --android
        working_directory: .

      - name: Add Android platform and sync
        script: |
          set -e
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build Android
        script: |
          cd android
          ./gradlew build
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
