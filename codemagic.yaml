workflows:
  ios-release:
    name: iOS Release Build
    environment:
      xcode: latest
      cocoapods: default
    triggers:
      - push:
          branches:
            - main
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods dependencies
        script: cd ios && pod install && cd ..
      - name: Build with Capacitor
        script: npx cap sync ios
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build
    artifacts:
      - build/Release-iphoneos/App.ipa
    publishing:
      app_store_connect:
        auth: key_id:issuer_id:p8_key

  android-release:
    name: Android Release Build
    environment:
      java: default
      node: latest
    triggers:
      - push:
          branches:
            - main
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build with Capacitor
        script: npx cap sync android
      - name: Build Android app
        script: cd android && ./gradlew bundleRelease && cd ..
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal