workflows:
  ios-release:
    name: FloraSonics iOS Release v2
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base698ab9ae938dc61b1a405bd7.app
        certificate_reference: IOS-Apple
        provisioning_profile_reference: IOS-Apple
      vars:
        BUNDLE_ID: "com.base698ab9ae938dc61b1a405bd7.app"
        APP_STORE_APPLE_ID: "6761284963"
        EXPORT_OPTIONS_PATH: "$HOME/export_options.plist"
      node: 18.17.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --ios
        working_directory: .

      - name: Add iOS platform, sync and install pods
        script: |
          set -e
          npx cap sync ios
          cd ios/App
          pod install --repo-update

      - name: Fix bundle identifier in Xcode
        script: |
          cd ios/App
          xcode-project update-bundle-id --bundle-id com.base698ab9ae938dc61b1a405bd7.app

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          set -e
          cat > "$HOME/export_options.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>method</key>
          <string>app-store</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>teamID</key>
          <string>KQ6PQHYD5D</string>
          <key>stripSwiftSymbols</key>
          <true/>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --config "Release" \
            --export-options-plist "$HOME/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: FloraSonics Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - keystore_reference: florasonics_keystore
          keystore: florasonics_keystore
      vars:
        PACKAGE_NAME: "com.base698ab9ae938dc61b1a405bd7.app"
      node: 18.17.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --android
        working_directory: .

      - name: Add Android platform and sync
        script: |
          set -e
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build Android
        script: |
          cd android
          ./gradlew build
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
