workflows:
  ios-release:
    name: FloraSonics iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base698ab9ae938dc61b1a405bd7.app
      vars:
        BUNDLE_ID: "com.base698ab9ae938dc61b1a405bd7.app"
        APP_STORE_APPLE_ID: "6761284963"
      node: 22.0.0
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform and sync
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Patch AppDelegate.swift
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          # Fix incorrect application:continue:restorationHandler: method signature
          # Replace the bad NSUserActivity-based open call with the correct URL-based one
          sed -i '' 's/application.application, continue userActivity: NSUserActivity, restorationHandler:/application(_ application: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) ->/g' "$APPDELEGATE" || true
          # Broader fix: replace the entire bad line 46 area using perl for multi-line safety
          perl -i -0pe 's/func application\(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping \(\[UIUserActivityRestoring\]\?\) -> Void\) -> Bool \{[^}]*return ApplicationDelegateProxy\.shared\.application\(application, continue: userActivity, restorationHandler: restorationHandler\)[^}]*\}/func application(_ application: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
              return ApplicationDelegateProxy.shared.application(application, open: url, options: options)
          }/gs' "$APPDELEGATE" || true

      - name: Set code signing settings
        script: |
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g' "$PBXPROJ"
          xcode-project use-profiles

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
