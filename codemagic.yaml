workflows:
  ios-release:
    name: FloraSonics iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: FloraSonics Codemagic

    environment:
      ios_signing:
        provisioning_profiles:
          - FloraSonics
        certificates:
          - FloraSonics App store
      vars:
        BUNDLE_ID: "com.florasonics.app"
        APP_STORE_APPLE_ID: "6761284963"
      node: 22.0.0
      xcode: 16.2

    scripts:
      - name: Print Node version
        script: node --version

      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --ios
        working_directory: .

      - name: Add iOS platform, sync and install pods
        script: |
          set -e
          node --version
          rm -rf ios
          echo "--- capacitor.config.ts contents ---"
          cat capacitor.config.ts
          echo "--- running cap add ios ---"
          npx cap add ios
          echo "--- running cap sync ios ---"
          npx cap sync ios
          echo "--- checking ios/App directory ---"
          ls -la ios/App/
          echo "--- iOS platform ready (SPM, no CocoaPods needed) ---"

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $((BUILD_NUMBER + 1))
        working_directory: ios/App

      - name: Build iOS
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config "Release" \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: FloraSonics Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - keystore: florasonics_keystore
      vars:
        PACKAGE_NAME: "com.florasonics.app"
      node: 22.0.0
      java: 17

    scripts:
      - name: Print Node version
        script: node --version

      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate app icon
        script: |
          npm install --save-dev @capacitor/assets
          npx capacitor-assets generate --android
        working_directory: .

      - name: Add Android platform and sync
        script: |
          set -e
          rm -rf android
          echo "--- running cap add android ---"
          npx cap add android
          echo "--- running cap sync android ---"
          npx cap sync android

      - name: Build Android
        script: |
          cd android
          ./gradlew build
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
